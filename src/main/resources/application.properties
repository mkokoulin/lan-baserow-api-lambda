# Default (prod)
quarkus.log.category."org.jboss.resteasy.reactive.client".level=WARN
quarkus.log.category."io.quarkus.rest.client.reactive".level=WARN
quarkus.rest-client.logging.scope=none

# Enable JWT debug logging, add to application.properties
quarkus.log.category."io.smallrye.jwt".level=DEBUG
quarkus.log.category."io.quarkus.smallrye.jwt".level=DEBUG

# Dev profile only
%dev.quarkus.log.category."org.jboss.resteasy.reactive.client".level=DEBUG
%dev.quarkus.log.category."io.quarkus.rest.client.reactive".level=DEBUG
%dev.quarkus.rest-client.logging.scope=request-response
%dev.quarkus.rest-client.logging.body-limit=0

mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=lan-auth
quarkus.native.resources.includes=publicKey.pem
mp.jwt.verify.