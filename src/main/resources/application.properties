# ============================================
# HTTP & API
# ============================================
quarkus.smallrye-health.root-path=/health

# ============================================
# JWT Auth
# ============================================
mp.jwt.verify.publickey=${JWT_PUBLIC_KEY}
mp.jwt.verify.issuer=lan-auth

# Private key for signing guest tokens (POST /auth/v1/login)
# In production: set JWT_SIGN_KEY_LOCATION to the path of the PEM private key
smallrye.jwt.sign.key.location=${JWT_SIGN_KEY_LOCATION:~/.keys/lan/privateKey.pem}

# Guest token TTL in days (default: 7)
app.guest-token.ttl-days=7

# ============================================
# Jandex indexing for submodules
# ============================================
quarkus.index-dependency.baserow.group-id=io.github.mkokoulin
quarkus.index-dependency.baserow.artifact-id=baserow-java-client

# ============================================
# Baserow REST Client
# ============================================
quarkus.rest-client.baserow.url=https://api.baserow.io
quarkus.rest-client.baserow.connect-timeout=5000
quarkus.rest-client.baserow.read-timeout=25000

# ============================================
# Baserow config (used by BaserowConfig mappings)
# ============================================
baserow.token=${BASEROW_TOKEN}

baserow.guests.guests-table-id=824729

baserow.events.events-table-id=992074
baserow.events.festivals-table-id=992075
baserow.events.registrations-table-id=992071
baserow.events.notifications-table-id=992072
baserow.events.payments-table-id=992073

baserow.coworking.notifications-table-id=831434
baserow.coworking.tariffs-table-id=824730
baserow.coworking.active-tariffs-table-id=831438
baserow.coworking.meeting-room-bookings-table-id=824738
baserow.coworking.guest-tariffs-table-id=831438
baserow.coworking.news-table-id=964888
baserow.coworking.reviews-table-id=988858
baserow.coworking.site-bookings-table-id=1002584

# ============================================
# Telegram (for payment admin notifications)
# ============================================
app.telegram-bot-token=${TELEGRAM_BOT_TOKEN:}
app.telegram-admin-chat-id=${TELEGRAM_ADMIN_CHAT_ID:}

# ============================================
# Cache
# ============================================
quarkus.cache.caffeine.events.expire-after-write=5M
quarkus.cache.caffeine.events.maximum-size=1000

# ============================================
# Logging (default = prod)
# ============================================
quarkus.log.category."org.jboss.resteasy.reactive.client".level=WARN
quarkus.log.category."io.quarkus.rest.client.reactive".level=WARN
quarkus.rest-client.logging.scope=none

# ============================================
# Dev profile
# ============================================
%dev.quarkus.log.level=INFO
%dev.quarkus.log.category."com.lan".level=DEBUG
%dev.quarkus.log.category."org.jboss.resteasy.reactive.client".level=DEBUG
%dev.quarkus.log.category."io.quarkus.rest.client.reactive".level=DEBUG
%dev.quarkus.log.category."io.smallrye.jwt".level=WARN
%dev.quarkus.log.category."io.quarkus.smallrye.jwt".level=WARN

%dev.quarkus.rest-client.logging.scope=request-response
%dev.quarkus.rest-client.logging.body-limit=10240

%dev.quarkus.cache.caffeine.events.expire-after-write=10S

%dev.quarkus.log.console.json=false
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
%dev.quarkus.http.access-log.enabled=true
%dev.quarkus.http.access-log.pattern="%r" %s %b %{RESPONSE_TIME}ms